specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Tatum
providerId: tatum
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Web3
- Blockchain
- RPC
- Multi-chain
- Wallet
- NFT
- Rate Limiting
description: Tatum enforces per-API-key requests-per-second and monthly credit caps.
  Methods cost different credit amounts.
notes: RPC Gateway, Data API, and Notifications each have their own pricing.
sources:
- https://tatum.io/pricing/
- https://docs.tatum.io/
responseCodes:
  throttled: 429
limits:
- name: Free RPS
  scope: api_key
  metric: requests_per_second
  limit: 5
  notes: Free plan.
- name: Standard RPS
  scope: api_key
  metric: requests_per_second
  limit: 50
  notes: Standard plan.
- name: Monthly Credits
  scope: account
  metric: credits
  limit: see plan
  notes: Monthly ceiling.
policies:
- name: Backoff Strategy
  description: Exponential backoff on 429.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
