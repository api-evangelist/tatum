specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Tatum
providerId: tatum
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Web3
- Blockchain
- RPC
- Multi-chain
- Wallet
- NFT
- Plans
description: Tatum sells tiered subscriptions with monthly credit allotments and per-second
  rate limits.
notes: Verify against tatum.io/pricing.
sources:
- https://tatum.io/pricing/
plans:
- id: tatum-free
  name: Free
  type: free
  description: Free plan with monthly credits.
  entries:
  - label: Monthly Credits
    name: monthly_credits
    type: included
    metric: credits
    limit: 1000000
    timeFrame: month
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  elements:
  - name: Community Support
- id: tatum-start
  name: Start
  type: paid
  description: Entry-level paid plan.
  entries:
  - label: Monthly Subscription
    name: monthly_subscription
    type: flat
    metric: subscription
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: 9
    userMultiplied: false
  elements:
  - name: Email Support
- id: tatum-basic
  name: Basic
  type: paid
  description: Higher allotment.
  entries:
  - label: Monthly Subscription
    name: monthly_subscription
    type: flat
    metric: subscription
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: 49
    userMultiplied: false
  elements:
  - name: Webhooks
- id: tatum-standard
  name: Standard
  type: paid
  description: Production-grade plan with priority support.
  entries:
  - label: Monthly Subscription
    name: monthly_subscription
    type: flat
    metric: subscription
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: 249
    userMultiplied: false
  elements:
  - name: Priority Support
  - name: Higher Throughput
- id: tatum-enterprise
  name: Enterprise
  type: enterprise
  description: Custom enterprise contracts.
  entries:
  - label: Custom
    name: custom
    type: flat
    metric: contract
    limit: -1
    timeFrame: year
    geo: global
    unit: 1
    price: contact sales
    userMultiplied: false
  elements:
  - name: SLAs
  - name: Dedicated Nodes
maintainers:
